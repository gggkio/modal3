name: Deploy to Modal (Stable)

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'  # 每30分鐘觸發一次（保活）

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Modal SDK
        run: pip install --no-cache-dir --upgrade "modal>=0.58.0"

      # ✅ 正確登入（已修復）
      - name: Setup Modal Auth
        run: |
          modal token set --token-id $MODAL_TOKEN_ID --token-secret $MODAL_TOKEN_SECRET
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

      # ✅ Debug（可刪）
      - name: Debug Token
        run: |
          echo "ID length: ${#MODAL_TOKEN_ID}"
          echo "SECRET length: ${#MODAL_TOKEN_SECRET}"
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

      # 🚀 啟動 sandbox
      - name: Run app remotely
        run: python deploy.py --sandbox

      # 🔥 保活機制（避免被回收）
      - name: Keep Alive Ping
        run: |
          echo "Keeping workflow alive..."
          sleep 60

      # 📝 更新時間（觸發 repo 活躍）
      - name: Commit time.txt to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt

          git add time.txt

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "⏱️ keep alive $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:main
          fi
