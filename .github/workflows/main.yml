name: Deploy to Modal

on:
  workflow_dispatch:
  schedule:
    - cron: '38 18 * * *'  # 每天 18:38 UTC

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10   

    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      # 删掉 MODAL_CONFIG_DIR，不要自己指定路径

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Modal SDK
        run: pip install --no-cache-dir --upgrade "modal>=0.58.0"

      - name: Check Modal version
        run: python -c "import modal; print(modal.__version__)"

      # ✅ 替换成官方认证命令，彻底解决 Token 格式问题
      - name: Setup Modal Auth
        run: |
          modal token set --token-id "$MODAL_TOKEN_ID" --token-secret "$MODAL_TOKEN_SECRET"

      - name: Run app remotely
        run: python deploy.py --sandbox
      
      - name: Commit time.txt to repo
        env:
         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ ! -f time.txt ]; then
            echo "首次生成时间：$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          else
            echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
          fi

          git add time.txt

          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "⏱️ 更新时间文件: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:main
          fi
